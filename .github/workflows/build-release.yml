name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Get dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos:
          - linux
          - darwin
        goarch:
          - amd64
          - arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Get dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi
          name="git-auto-${GOOS}-${GOARCH}${ext}"
          go build -ldflags="-s -w" -o "$name" ./cmd/git-auto

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: git-auto-${{ matrix.goos }}-${{ matrix.goarch }}
          path: git-auto-*

  release:
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create checksums
        run: |
          for dir in artifacts/*/; do
            (
              cd "$dir"
              sha256sum * | sed 's|.*/||' > "../$(basename "$PWD").sha256sum"
            )
          done

      - name: Generate release notes
        id: release-notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/$PREV_TAG...$TAG"
            NOTES="## Changes\nSee [$PREV_TAG → $TAG]($COMPARE_URL) for the full diff.\n\n## Installation\nDownload the binary for your platform from the assets below."
          else
            NOTES="## Changes\nInitial release.\n\n## Installation\nDownload the binary for your platform from the assets below."
          fi

          echo "body=$NOTES" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/git-auto-*
            artifacts/**/*.sha256sum
          body: ${{ steps.release-notes.outputs.body }}
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
